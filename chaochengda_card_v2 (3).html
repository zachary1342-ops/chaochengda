<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>潮恢搭</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: sans-serif;
  padding: 20px;
}
.card {
  width: 420px;
  background: #111;
  border-radius: 24px;
  border: 1.5px solid rgba(245,193,0,0.25);
  overflow: hidden;
  box-shadow: 0 0 60px rgba(245,193,0,0.08), 0 20px 60px rgba(0,0,0,0.8);
}
.top-bar { background: linear-gradient(135deg,#F5C100,#D4A017); height: 4px; }
.header {
  padding: 28px 28px 20px;
  display: flex;
  align-items: center;
  gap: 18px;
  border-bottom: 1px solid rgba(245,193,0,0.12);
}
.logo-wrap {
  width: 90px; height: 90px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid #F5C100;
  flex-shrink: 0;
  background: #000;
}
.logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
.brand-name {
  font-size: 32px; font-weight: 900; letter-spacing: 4px;
  color: #F5C100; margin-bottom: 6px;
}
.divider-line { width: 40px; height: 2px; background: #F5C100; margin: 6px 0; border-radius: 2px; }
.brand-sub { font-size: 12px; color: #999; letter-spacing: 1px; }
.body {
  padding: 24px 28px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.qr-section { display: flex; flex-direction: column; align-items: center; gap: 10px; flex-shrink: 0; }
.qr-frame {
  width: 148px; height: 148px;
  background: #fff;
  border-radius: 12px;
  padding: 8px;
  border: 2px solid #F5C100;
  box-shadow: 0 0 20px rgba(245,193,0,0.18);
}
.qr-frame img { width: 100%; height: 100%; display: block; border-radius: 4px; }
.qr-label { font-size: 11px; color: #F5C100; letter-spacing: 2px; text-align: center; font-weight: 700; }
.info-section { flex: 1; display: flex; flex-direction: column; gap: 22px; }
.info-item { display: flex; align-items: flex-start; gap: 10px; }
.info-icon {
  width: 28px; height: 28px;
  background: rgba(245,193,0,0.08);
  border: 1px solid rgba(245,193,0,0.18);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}
.info-label { font-size: 10px; color: #666; letter-spacing: 1px; margin-bottom: 2px; }
.info-value { font-size: 13px; color: #e0e0e0; font-weight: 700; }
.scan-hint {
  display: flex; align-items: center; gap: 8px;
  background: rgba(245,193,0,0.06);
  border: 1px solid rgba(245,193,0,0.15);
  border-radius: 8px;
  padding: 10px 14px;
  margin: 0 28px;
}
.scan-hint-text { font-size: 11px; color: #aaa; }
.scan-hint-text strong { color: #F5C100; }
.footer {
  margin: 18px 28px 24px;
  padding-top: 16px;
  border-top: 1px solid rgba(245,193,0,0.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.tagline { font-size: 13px; color: #F5C100; letter-spacing: 2px; font-weight: 700; }
.dots { display: flex; gap: 6px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #F5C100; }
.dot:nth-child(2) { opacity: 0.6; }
.dot:nth-child(3) { opacity: 0.3; }
</style>
</head>
